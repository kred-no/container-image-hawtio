# https://cicube.io/blog/github-actions-cache/#docker-layer-caching
---
name: hawtio

on:
  workflow_dispatch: {}
  
  schedule:
    - cron: "12 07 */20 * *"
  
  # Trigger workflow on GitHub Release publish event
  #release:
  #  types:
  #    - published

env: {}

jobs:
  standard_build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      packages: write
      contents: read
    
    strategy:
      fail-fast: true
      matrix:
        target_prefix: 25-jre
        build_image:
          - docker.io/alpine:3
        runtime_image:
          - docker.io/eclipse-temurin:25-jre
        hawtio_app_version:
          - '2.17.7'
        #include:
        #  - build_image: xx
        #    runtime_image: yy
        #    hawtio_app_version: x.y.z
        exclude: []
    
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      -
        name: Login to docker hub
        uses: docker/login-action@v3
        with:
          registry: registry.hub.docker.com
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      #-
      #  name: Login to ghcr.io
      #  if: false
      #  uses: docker/login-action@v3
      #  with:
      #    registry: ghcr.io
      #    username: ${{ github.actor }}
      #    password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Configure Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            registry.hub.docker.com/kdsda/hawtio
          flavor: |
            prefix=${{ matrix.target_prefix }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD-HHmmss' tz='Europe/Oslo'}}
            type=ref,event=branch
      -
        name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: "{{ defaultContext }}:src"
          file: Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          #secrets: |
          #  "example_secret=${{ secrets.SOME_SECRET }}"
          build-args: |
            builder_image=${{ matrix.builder_image }}
            runtime_image=${{ matrix.runtime_image }}
            hawtio_app_version=${{ matrix.hawtio_app_version }}
          push: true
