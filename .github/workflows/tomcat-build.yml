# https://cicube.io/blog/github-actions-cache/#docker-layer-caching
---
name: tomcat

on:
  workflow_dispatch: {}
  
  schedule:
    - cron: "12 07 */28 * *"
  
env:
  builder_image: 'docker.io/alpine/ansible'
  runtime_image: 'docker.io/tomcat'

jobs:
  standard_build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      packages: write
      contents: read
    
    strategy:
      fail-fast: true
      matrix:
        versions:
          - builder: '2.20.0'
            runtime: 'jre25-temurin'
            hawtio: '5.0.1'
        exclude: []
        include: []
    
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Setup Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
      -
        name: Login to docker hub
        uses: docker/login-action@v3
        with:
          registry: registry.hub.docker.com
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Configure Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            registry.hub.docker.com/kdsda/hawtio
          flavor: |
            prefix=${{ matrix.versions.hawtio }}-tomcat-${{ matrix.versions.runtime }}-
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD-HHmmss' tz='Europe/Oslo'}}
            type=ref,event=branch
      -
        name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: "{{ defaultContext }}:src"
          file: Dockerfile.ansible
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          #secrets: |
          #  "example_secret=${{ secrets.SOME_SECRET }}"
          build-args: |
            builder_image=${{ env.builder_image }}:${{ matrix.versions.builder }}
            runtime_image=${{ env.runtime_image }}:${{ matrix.versions.runtime }}
            hawtio_version=${{ matrix.versions.hawtio }}
          push: true
