services:
  activemq:
    hostname: activemq
    image: activemq:local
    build:
      context: .
      dockerfile: ./Dockerfile.activemq
    environment:
      ACTIVEMQ_OPTS: "-javaagent:/opt/activemq/lib/jolokia-jvm.jar=port=8778,host=0.0.0.0 -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.authenticate=false"
      JAVA_TOOL_OPTIONS: "-XX:+ExitOnOutOfMemoryError -XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxGCPauseMillis=500 -XX:+PerfDisableSharedMem -Xss512k -Xshare:on -Xlog:gc*:stdout:uptime,level,tags"

  hawtio:
    hostname: hawtio
    image: hawtio:local
    build:
      context: ./../src
      dockerfile: Dockerfile.ansible
    environment:
      CATALINA_OPTS: "$CATALINA_OPTS -Dhawtio.authenticationEnabled=false -Dhawtio.proxyAllowlist=* -Dhawtio.remote.name=activemq -Dhawtio.remote.host=activemq -Dhawtio.remote.port=8778 -Dhawtio.remote.path=jolokia"
      JAVA_TOOL_OPTIONS: "-XX:+ExitOnOutOfMemoryError -XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxGCPauseMillis=500 -XX:+PerfDisableSharedMem -Xss512k -Xshare:on -Xlog:gc*:stdout:uptime,level,tags"

    ports:
      - "8080:8080"
    depends_on:
      - activemq
