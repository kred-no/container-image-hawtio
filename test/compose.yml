services:
  activemq:
    hostname: activemq
    image: activemq:local
    build:
      context: .
      dockerfile: ./Dockerfile.activemq
    environment:
      ACTIVEMQ_OPTS: "-javaagent:/opt/activemq/lib/jolokia-jvm-agent.jar=port=8778,host=0.0.0.0 -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.authenticate=false"

  hawtio:
    hostname: hawtio
    image: hawtio:local
    build:
      context: ./../src
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - activemq
